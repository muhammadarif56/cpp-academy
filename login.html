<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPP Academy</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop class="video-bg">
        <source src="vidio.mp4" type="video/mp4">
    </video>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- MAIN CONTENT -->
    <section class="hero">

        <h1>CPP ACADEMY</h1>

        <h3>Learn Modern C++ Programming</h3>

        <!-- START LEARNING BUTTON -->
        <button class="start-btn" onclick="showLogin()">
            Start Learning
        </button>

        <!-- DESCRIPTION -->
        <p class="description">
            At CPP Academy, C++ is taught in a simple and structured way to build a
            strong programming foundation. We guide you from basics to advanced concepts
            with a clear and practical approach.
        </p>

        <!-- LOGIN BOX -->
        <div class="login-box" id="loginBox">

            <h2>Login</h2>

            <div class="input-box">
                <input type="email" id="email" placeholder="Enter Email">
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Enter Password">
            </div>

            <button class="login-btn" onclick="loginUser()">
                Login
            </button>

        </div>

    </section>

    <!-- JAVASCRIPT -->
    <script>

        // login box hide on page load
        document.getElementById("loginBox").style.display = "none";

        // show login
        function showLogin(){
            document.getElementById("loginBox").style.display = "block";
        }

        // login function
        function loginUser(){

            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            if(email !== "" && password !== ""){
                window.location.href = "home.html";
            }
            else{
                alert("Please enter email and password");
            }
            
        }

    </script>

</body>
</html>
